name: release

on:
  push:
    branches:
      - main
      - master
    paths:
      - VERSION

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      # node 22.x bundles npm 10.9.8, whose `npm ci` both crashes with
      # "Exit handler never called!" and trips npm/cli#4828 (skips Rollup's
      # platform-specific optional dep on Linux). Use a stable npm…
      - name: Use a stable npm
        run: npm install -g npm@11

      # …and `npm install` (not `npm ci`) so the Linux Rollup binary
      # (@rollup/rollup-linux-x64-gnu) resolves from the macOS-generated lockfile.
      - name: Install
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Package
        run: bash ./package.sh

      - name: Release to GitHub
        uses: opspresso/action-builder@master
        with:
          args: --release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ASSET_PATH: ./release
